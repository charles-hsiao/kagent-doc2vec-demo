# MCP Server Deployment (ConfigMap, Deployment, Service)
# Note: mcp-secrets is created by `make kind-setup` from OPENAI_API_KEY in .env
---
# 1. ConfigMap: MCP server configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: mcp-config
  namespace: kagent
data:
  SQLITE_DB_DIR: "/data"
  PORT: "3001"
  TRANSPORT_TYPE: "http"
---
# 3. Deployment (replace <your-registry> with your actual image registry)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mcp-sqlite-vec
  namespace: kagent
  labels:
    app: mcp-sqlite-vec
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mcp-sqlite-vec
  template:
    metadata:
      labels:
        app: mcp-sqlite-vec
    spec:
      containers:
        - name: mcp-sqlite-vec
          image: ops-mcp-server:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: mcp-secrets
                  key: OPENAI_API_KEY
            - name: SQLITE_DB_DIR
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: SQLITE_DB_DIR
            - name: PORT
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: PORT
            - name: TRANSPORT_TYPE
              valueFrom:
                configMapKeyRef:
                  name: mcp-config
                  key: TRANSPORT_TYPE
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
# 4. Service (ClusterIP, accessible within the cluster by kagent agents)
apiVersion: v1
kind: Service
metadata:
  name: mcp-sqlite-vec
  namespace: kagent
spec:
  selector:
    app: mcp-sqlite-vec
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
